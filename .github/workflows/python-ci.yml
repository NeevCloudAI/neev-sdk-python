name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Test (py ${{ matrix.python-version }})
    runs-on: neevai-runner-dev
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Verify generated types are in sync with the spec
        run: |
          uv run python scripts/gen_types.py
          git diff --exit-code src/neevai/generated
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check (pyright)
        run: uv run pyright
      - name: Type check (mypy)
        run: uv run mypy
      - name: Test
        run: uv run pytest -v
      - name: Build package
        run: uv build
